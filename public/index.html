<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyerForeSight - User Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Unicons for Icons -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation Header -->
        <header class="sidebar glass-panel">
            <div class="logo">
                <i class="uil uil-users-alt"></i>
                <span>Users Hub</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active"><i class="uil uil-apps"></i> Dashboard</a>
                <a href="#"><i class="uil uil-setting"></i> Settings</a>
            </nav>
            <div class="profile-preview">
                <div class="avatar">A</div>
                <div class="info">
                    <strong>Admin</strong>
                    <span>System Manager</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar glass-panel">
                <div class="search-box">
                    <i class="uil uil-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users by name or email...">
                </div>
                <button class="btn btn-primary" id="addUserBtn">
                    <i class="uil uil-plus"></i> Add New User
                </button>
            </div>

            <div class="content-header">
                <h1>User Management</h1>
                <div class="sort-controls">
                    <span class="label">Sort by:</span>
                    <select id="sortSelect">
                        <option value="id">ID</option>
                        <option value="name">Name</option>
                        <option value="email">Email</option>
                        <option value="created_at" selected>Created Date</option>
                    </select>
                    <button id="sortOrderBtn" class="btn btn-icon" title="Toggle Order">
                        <i class="uil uil-sort-amount-down"></i>
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="table-container glass-panel">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Email Address</th>
                            <th>Joined Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- User rows will be injected here via JS -->
                    </tbody>
                </table>
                <!-- Loading & Empty States -->
                <div id="loadingState" class="state-container hidden">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
                <div id="emptyState" class="state-container hidden">
                    <i class="uil uil-folder-info empty-icon"></i>
                    <p>No users found matching your query.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div class="modal-overlay hidden" id="userModal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="modalTitle">Add New User</h2>
                <button class="btn btn-icon close-modal"><i class="uil uil-times"></i></button>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="uil uil-user"></i>
                        <input type="text" id="userName" required placeholder="e.g. Jane Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="uil uil-envelope"></i>
                        <input type="email" id="userEmail" required placeholder="jane@example.com">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <i class="uil uil-check-circle" id="toastIcon"></i>
        <span id="toastMessage">Success</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
